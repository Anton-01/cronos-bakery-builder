; -----------------------------------------------------------------------------
; Custom PHP configuration for the Cronos backend
; -----------------------------------------------------------------------------
memory_limit = 512M
upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 120
max_input_time = 120
date.timezone = UTC

; OPcache — production-friendly defaults (validate timestamps for dev convenience)
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0

; Error handling — verbose in dev, override in production images
display_errors = On
log_errors = On
error_reporting = E_ALL
